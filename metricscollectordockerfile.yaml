# Single-stage build for the Garuda Tier 2 metrics collector.
# Uses internal Ubuntu base + apt-installed Python (no pre-baked Python image).
#
# Build from the 03-metrics-collector directory:
#   docker build -f Dockerfile2 -t garuda-tier2:latest .

# Default to -ci (same registry you push prodhub/* images to).
# Override if you only have JFrog access:
#   --build-arg BASE_IMAGE=myntrapaas.jfrog.io/dockerhub/ubuntu_base/ubuntu:artifactory-apt
ARG BASE_IMAGE=/dockerhub/ubuntu_base/ubuntu:v1
FROM ${BASE_IMAGE}

WORKDIR /app

# Tell apt to skip TLS verification (Myntra internal cert issue)
RUN echo 'Acquire::https::Verify-Peer "false";' > /etc/apt/apt.conf.d/99insecure && \
    echo 'Acquire::https::Verify-Host "false";' >> /etc/apt/apt.conf.d/99insecure

# Install Python 3, pip, and build deps for numpy/scikit-learn/statsmodels
RUN apt-get update && \
    apt-get install -y --no-install-recommends \
        python3 \
        python3-pip \
        python3-venv \
        build-essential \
        gcc \
        g++ \
        libzstd-dev \
    && apt-get clean && \
    rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/* /usr/share/doc/* /usr/share/man/*

RUN ln -sf /usr/bin/python3 /usr/bin/python

# Copy project metadata and source
COPY pyproject.toml .
COPY garuda_tier2 ./garuda_tier2

# Install the package and runtime dependencies (aiohttp, aiokafka, sklearn, etc.)
RUN pip3 install --no-cache-dir --break-system-packages \
    --trusted-host pypi.org \
    --trusted-host files.pythonhosted.org \
    . && \
    find / -name "*.pyc" -delete && \
    find / -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true

EXPOSE 9090

# Override the base image entrypoint (/etc/init-post.sh) completely
ENTRYPOINT []
CMD ["garuda-tier2"]
